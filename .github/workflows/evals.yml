name: evals
on:
  push: {branches: [main]}
  pull_request:
  workflow_dispatch: {}
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install -e ".[dev]"
      - run: python data/synthetic/generate.py
      - run: pytest -q
      - run: python -m evals.run_evals
